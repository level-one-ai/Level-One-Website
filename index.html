    <!-- Structured data: who Level One is, what it does, who it serves -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "#organization",
          "name": "Level One",
          "description": "Level One is an automation and digital growth agency based in Edinburgh, Scotland. It builds websites, workflow automation, review and reputation systems, and local search growth for UK small businesses including trades, dental practices, hospitality and property teams.",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Edinburgh",
            "addressCountry": "GB"
          },
          "areaServed": {
            "@type": "Country",
            "name": "United Kingdom"
          },
          "slogan": "Take your business to the next level."
        },
        {
          "@type": "WebSite",
          "name": "Level One",
          "publisher": { "@id": "#organization" },
          "inLanguage": "en-GB"
        },
        {
          "@type": "ProfessionalService",
          "name": "Level One",
          "parentOrganization": { "@id": "#organization" },
          "priceRange": "££",
          "makesOffer": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Websites That Convert",
                "description": "Fast, search-ready websites engineered to turn visitors into enquiries."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Workflow Automation",
                "description": "Bookings, follow-ups, invoicing and admin handled automatically so no lead waits overnight."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Reviews & Reputation",
                "description": "Five-star reviews requested, tracked and answered on autopilot — the trust signals local customers look for."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Local Search Growth",
                "description": "Local visibility and content that compounds month after month, so businesses own the searches that matter in their area."
              }
            }
          ]
        }
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What kind of projects do you take on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Level One builds websites, workflow automation, review and reputation systems, and local search growth for UK small businesses — including trades, dental practices, hospitality and property teams. If it wins you time or customers, it's in scope."
          }
        },
        {
          "@type": "Question",
          "name": "How long does a typical engagement last?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most fixed-price projects run four to ten weeks from kickoff to launch. Ongoing management retainers continue for as long as they're moving the needle."
          }
        },
        {
          "@type": "Question",
          "name": "Do you offer fixed pricing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Every project starts with a free growth mapping call, followed by a written proposal with a fixed scope, timeline, and price. No hourly billing, ever."
          }
        },
        {
          "@type": "Question",
          "name": "Can you work with our existing team?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. We plug into your stack, your standups, and your review cadence. Most partners treat us as an embedded senior pod rather than an outside vendor."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after launch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You keep everything — code, files, documentation. If you'd like us to stay on for monitoring, iteration, or new surfaces, we offer month-to-month retainers."
          }
        },
        {
          "@type": "Question",
          "name": "How do we get started?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Book a growth mapping call. Thirty minutes, no pitch. If it feels like a fit, we'll follow up within 24 hours with a written proposal."
          }
        }
      ]
    }
    </script>
  </head>
